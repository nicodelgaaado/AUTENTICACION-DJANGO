{% extends "base.html" %}

{% block title %}Acceso denegado{% endblock %}

{% block content %}
<section class="page-narrow">
    <article class="panel status-card status-card-left">
        <div class="status-icon status-icon-danger" aria-hidden="true">!</div>
        <h1 class="panel-title">Acceso denegado</h1>
        <p class="panel-copy">No tienes permisos para acceder a esta página.</p>
        {% if permisos.puede_listar %}
            <a class="button" href="{% url 'listar_calificaciones' %}">Volver al listado</a>
        {% else %}
            <a class="button" href="{% url 'login' %}">Iniciar sesión</a>
        {% endif %}
    </article>
</section>
{% endblock %}
