{% extends "base.html" %}

{% block title %}Editar calificacion{% endblock %}

{% block content %}
<section class="panel">
    <h1>Editar calificacion</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button" type="submit">Actualizar</button>
        <a class="button secondary" href="{% url 'listar_calificaciones' %}">Cancelar</a>
    </form>
</section>
{% endblock %}
