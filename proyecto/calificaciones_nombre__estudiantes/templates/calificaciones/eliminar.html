{% extends "base.html" %}

{% block title %}Eliminar calificacion{% endblock %}

{% block content %}
<section class="panel">
    <h1>Eliminar calificacion</h1>
    <p>Confirma la eliminacion de la calificacion de {{ calificacion.nombre_estudiante }} en {{ calificacion.asignatura }}.</p>
    <form method="post">
        {% csrf_token %}
        <button class="button danger" type="submit">Eliminar</button>
        <a class="button secondary" href="{% url 'listar_calificaciones' %}">Cancelar</a>
    </form>
</section>
{% endblock %}
